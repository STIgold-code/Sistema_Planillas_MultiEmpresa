name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Verificacion de tipos
        run: npx tsc --noEmit

      - name: Sin any explicito
        run: |
          OUTPUT=$(npx eslint "{src,apps,libs,test}/**/*.ts" || true)
          if echo "$OUTPUT" | grep -q "no-explicit-any"; then
            echo "::error::Se encontraron usos de 'any' explicito"
            echo "$OUTPUT" | grep "no-explicit-any"
            exit 1
          fi

      - name: Tests
        run: npx jest --maxWorkers=2

      # Lint completo: informativo hasta saldar la deuda heredada de RRHH.
      - name: Lint (informativo)
        run: npx eslint "{src,apps,libs,test}/**/*.ts" || true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificacion de tipos
        run: npx tsc --noEmit

      - name: Sin any explicito
        run: |
          OUTPUT=$(npx eslint src || true)
          if echo "$OUTPUT" | grep -q "no-explicit-any"; then
            echo "::error::Se encontraron usos de 'any' explicito"
            echo "$OUTPUT" | grep "no-explicit-any"
            exit 1
          fi

      # Lint completo: informativo hasta saldar la deuda heredada de RRHH.
      - name: Lint (informativo)
        run: npx eslint src || true
